<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Carteirinha | Escola Municipal Castro Alves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #1a0e08;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      color: #fff;
    }

    /* NAVIGATION SPA */
    .nav-spa {
      display: flex; gap: 1rem; margin-bottom: 2rem;
      background: rgba(80, 35, 10, 0.5);
      padding: 0.8rem 1.5rem; border-radius: 50px;
      border: 1px solid rgba(180, 100, 40, 0.3);
      backdrop-filter: blur(10px);
    }
    .nav-btn {
      background: none; border: none; color: #a07050;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; padding: 0.5rem 1.2rem; border-radius: 20px;
      transition: all 0.2s;
    }
    .nav-btn.active { background: #e8763a; color: #fff; }
    .nav-btn:hover:not(.active) { color: #f5c87a; }

    /* HEADER */
    .page-header { text-align: center; margin-bottom: 2.5rem; }
    .page-header h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #f5c87a, #e8763a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
    .page-header p { color: #a07050; font-size: 0.95rem; }

    .btn-logout {
      background: rgba(200,75,31,0.2);
      border: 1px solid rgba(200,75,31,0.4);
      border-radius: 8px;
      color: #e8763a; font-family: inherit;
      font-size: 0.82rem; font-weight: 600;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 1rem;
    }

    .db-status {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(40,20,5,0.6);
      border: 1px solid rgba(180,100,40,0.3);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem; color: #a07050;
      margin-top: 0.5rem;
    }
    .db-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #888; flex-shrink: 0; }
    .db-status.loaded .dot { background: #6db87a; }
    .db-status.loading .dot { background: #f5c87a; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

    /* LAYOUT */
    .main-layout {
      width: 100%; max-width: 1100px;
      display: grid; grid-template-columns: 340px 1fr;
      gap: 2rem; align-items: start;
    }

    /* FORMULÁRIO */
    .form-panel {
      background: rgba(80, 35, 10, 0.5);
      border: 1px solid rgba(180, 100, 40, 0.3);
      border-radius: 16px; padding: 1.5rem;
      backdrop-filter: blur(10px); position: sticky; top: 1rem;
    }
    .form-panel h2 {
      font-size: 1.1rem; font-weight: 700; color: #f5c87a;
      margin-bottom: 1.2rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(180,100,40,0.3);
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: #c89060; margin-bottom: 0.3rem;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group input, .form-group select {
      width: 100%; background: rgba(20, 10, 5, 0.7);
      border: 1px solid rgba(180, 100, 40, 0.4);
      border-radius: 8px; color: #fff;
      font-family: inherit; font-size: 0.92rem;
      padding: 0.6rem 0.8rem; outline: none;
    }
    .form-group input:focus { border-color: #e8763a; }

    .photo-upload-area {
      width: 100%; height: 80px;
      border: 2px dashed rgba(180, 100, 40, 0.5);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.8rem; color: #a07050;
    }

    .btn-actions { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.2rem; }
    .btn-add { background: #a04018; border: none; border-radius: 10px; color: #fff; padding: 0.85rem; font-weight: 700; cursor: pointer; }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-download { background: linear-gradient(135deg, #c84b1f, #e8763a); border: none; border-radius: 10px; color: #fff; padding: 0.85rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(200, 75, 31, 0.4); }
    .btn-limpar { background: rgba(200,30,30,0.3); border: 1px solid rgba(220,60,60,0.4); border-radius: 10px; color: #ffaaaa; padding: 0.7rem; cursor: pointer; }

    /* CARD PREVIEW ORIGINAL */
    #carteirinha {
      width: 680px; background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .card-header { position: relative; height: 100px; display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; background: #5C2308; }
    .card-header.header-escolar { background: #5C2308; }
    .card-header.header-saida { background: #1e3a8a !important; }
    .card-header.header-saida::before, 
    .card-header.header-saida::after { display: none !important; }
    
    .school-logo-wrap { position: relative; z-index: 2; display: flex; align-items: center; gap: 12px; flex-direction: row-reverse; }
    .school-logo { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #F5C030; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .school-logo img { width: 100%; height: 100%; object-fit: cover; }
    .school-name { color: #fff; text-align: right; line-height: 1.2; }
    .school-name .line1 { font-size: 0.78rem; opacity: 0.85; }
    .school-name .line2 { font-size: 1.15rem; font-weight: 900; }

    .card-body { display: flex; min-height: 260px; background: #f8f4ef; }
    .card-left { width: 210px; display: flex; flex-direction: column; align-items: center; padding: 18px 12px; gap: 10px; background: #fff; border-right: 1px solid #e8ddd0; flex-shrink: 0; }
    .photo-circle { width: 145px; height: 145px; border-radius: 50%; border: 3px solid #C07030; overflow: hidden; background: #eee; flex-shrink: 0; }
    .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .qr-area { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    #qr-code-card { width: 80px; height: 80px; flex-shrink: 0; background: #fff; padding: 4px; box-sizing: content-box; }
    #qr-code-card canvas, #qr-code-card img { width: 80px !important; height: 80px !important; }
    .qr-label { font-size: 0.68rem; font-weight: 700; color: #C84B1F; font-style: italic; }

    .card-right { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; }
    .card-title { font-size: 0.85rem; font-weight: 900; color: #C84B1F; text-transform: uppercase; margin-bottom: 14px; }
    .data-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; align-items: flex-start; }
    .data-label { font-size: 0.78rem; font-weight: 700; color: #5C2308; padding-top: 2px; white-space: nowrap; }
    .data-value { font-size: 0.82rem; color: #1a0a00; border-bottom: 1px solid #d0bfaf; min-height: 18px; padding-bottom: 2px; font-weight: 500; }

    .card-footer { background: #fff; padding: 12px 20px; border-top: 1px solid #e8ddd0; }
    .auth-button {
      width: 100%; padding: 12px 16px; border-radius: 25px;
      color: #fff; font-size: 0.75rem; text-align: center;
      display: block; box-sizing: border-box; min-height: 40px;
      font-weight: 700; font-style: italic;
      background: #C84B1F;
    }
    .auth-button.btn-saida { background: #1e3a8a !important; }

    /* FILA IMPRESSÃO — 10cm x 7cm */
    .pagina-impressao { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; margin-top: 2rem; }
    .carteirinha-fila { 
      width: 10cm; height: 7cm; background: #fff; border: 1px solid #ddd;
      display: flex; flex-direction: column; overflow: hidden; position: relative;
      page-break-inside: avoid; flex-shrink: 0;
    }
    
    /* REGRAS DE IMPRESSÃO A4 — AJUSTADO PARA NÃO CORTAR */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white !important; padding: 0; display: block !important; margin: 0; }
      .nav-spa, .page-header, .form-panel, #carteirinha, .btn-logout, .preview-label { display: none !important; }
      .main-layout { display: block !important; margin: 0; }
      .pagina-impressao { display: grid !important; grid-template-columns: repeat(2, 10cm) !important; gap: 0 !important; width: 100%; justify-content: center; }
      .carteirinha-fila { box-shadow: none !important; margin: 0 !important; border: 1px solid #eee; }
    }

    /* RESPONSIVIDADE CELULAR */
    @media (max-width: 720px) {
      .main-layout { grid-template-columns: 1fr; }
      #carteirinha { 
        width: 100%; 
        max-width: 680px; 
        zoom: 0.5; 
        margin: 0 auto;
      }
      .nav-spa { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<nav class="nav-spa">
  <button class="nav-btn active" id="btn-sec-escolar" onclick="mostrarSecao('escolar')">🚌 Transporte Escolar</button>
  <button class="nav-btn" id="btn-sec-saida" onclick="mostrarSecao('saida')">🚪 Saída Antecipada</button>
</nav>

<header class="page-header">
  <h1 id="page-title">Gerador de Carteirinhas</h1>
  <p id="page-subtitle">Escola Municipal Castro Alves</p>
  <div id="status-container">
    <span class="db-status loading" id="db-status">
      <span class="dot"></span>
      <span id="db-status-text">Carregando dados...</span>
    </span>
  </div>
  <button class="btn-logout" onclick="fazerLogout()">Sair</button>
</header>

<div class="main-layout">
  <aside class="form-panel">
    <h2 id="form-title">📝 Dados do Aluno</h2>
    
    <div id="form-escolar">
      <div class="form-group">
        <label>Selecionar Aluno</label>
        <select id="sel-aluno"><option value="">Selecione...</option></select>
      </div>
      <div class="form-group"><label>Nome *</label><input type="text" id="inp-nome" oninput="atualizar()"></div>
      <div class="form-group"><label>Matrícula</label><input type="text" id="inp-matricula" oninput="atualizar()"></div>
      <div class="form-group"><label>D.N</label><input type="text" id="inp-dn" oninput="atualizar()"></div>
      <div class="form-group"><label>Endereço</label><input type="text" id="inp-endereco" oninput="atualizar()"></div>
      <div class="form-group"><label>Linha *</label><input type="text" id="inp-linha" oninput="atualizar()"></div>
      <div class="form-group"><label>WhatsApp</label><input type="text" id="inp-tel" oninput="atualizarQR()"></div>
    </div>

    <div id="form-saida" style="display:none">
      <div class="form-group"><label>NomeCompleto *</label><input type="text" id="inp-saida-nome" oninput="atualizar()"></div>
      <div class="form-group"><label>Matrícula</label><input type="text" id="inp-saida-mat" oninput="atualizar()"></div>
      <div class="form-group"><label>Data de Nascimento (D.N)</label><input type="text" id="inp-saida-dn" oninput="atualizar()"></div>
      <div class="form-group"><label>Endereço</label><input type="text" id="inp-saida-end" oninput="atualizar()"></div>
    </div>

    <div class="form-group">
      <label>Foto</label>
      <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()"><span>Clique para foto</span></div>
      <input type="file" id="photo-input" accept="image/*" onchange="carregarFoto(this)">
    </div>

    <div class="btn-actions">
      <button class="btn-add" id="btn-adicionar" onclick="adicionarNaFila()" disabled>➕ Adicionar à Folha</button>
      <button class="btn-download" onclick="window.print()">🖨️ Imprimir Folha</button>
      <button class="btn-limpar" onclick="limparFila()">🗑️ Limpar Folha</button>
    </div>
  </aside>

  <div class="card-panel">
    <div class="preview-label">PRÉVIA DA CARTEIRINHA</div>
    <div id="carteirinha">
      <div class="card-header header-escolar" id="card-header">
        <div class="school-logo-wrap">
          <div class="school-logo"><img src="logo_escola.png" alt="Logo" id="img-logo"></div>
          <div class="school-name"><div class="line1">Escola Municipal</div><div class="line2">Castro Alves</div></div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-left">
          <div class="photo-circle" id="photo-preview-wrap"><img id="photo-preview" style="display:none"></div>
          <div class="qr-area" id="qr-container">
            <div id="qr-code-card"></div>
            <div class="qr-label">Contato</div>
          </div>
        </div>
        <div class="card-right">
          <div class="card-title" id="card-title">IDENTIFICAÇÃO</div>
          <div class="data-grid" id="data-display"></div>
        </div>
      </div>
      <div class="card-footer"><div class="auth-button" id="card-footer-btn">Autorização</div></div>
    </div>
    <div class="pagina-impressao" id="fila-carteirinhas"></div>
  </div>
</div>

<script>
  let secaoAtual = 'escolar';
  let ALUNOS = [];
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1_0Nr7rt1RClLouJ_g4saqU7JluswzIWf/gviz/tq?tqx=out:csv&sheet=Base%20de%20dados';

  function verificarAuth() {
    try { if (localStorage.getItem('castroalves_auth') !== 'ok') window.location.href = 'login.html'; } catch(e) {}
  }
  verificarAuth();

  function fazerLogout() { localStorage.removeItem('castroalves_auth'); window.location.href = 'login.html'; }

  function mostrarSecao(s) {
    secaoAtual = s;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-sec-' + s).classList.add('active');
    document.getElementById('form-escolar').style.display = s === 'escolar' ? 'block' : 'none';
    document.getElementById('form-saida').style.display = s === 'saida' ? 'block' : 'none';
    document.getElementById('status-container').style.display = s === 'escolar' ? 'block' : 'none';
    
    document.getElementById('card-header').className = 'card-header header-' + s;
    const btnFooter = document.getElementById('card-footer-btn');
    btnFooter.className = 'auth-button btn-' + s;
    
    setTimeout(() => {
      atualizarQR();
    }, 50);
    
    atualizar();
  }

  async function carregarDados() {
    const statusEl = document.getElementById('db-status');
    const statusText = document.getElementById('db-status-text');
    const controller = new AbortController();
    const tId = setTimeout(() => controller.abort(), 10000);

    try {
      const resp = await fetch(SHEET_CSV_URL + '&t=' + Date.now(), { signal: controller.signal });
      clearTimeout(tId);
      if (!resp.ok) throw new Error();
      const csv = await resp.text();
      ALUNOS = csv.trim().split('\n').slice(1).map(l => {
        const c = l.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        return { nome: c[0], mat: c[1], dn: c[2], tel: c[5], end: c[6], linha: c[7] };
      }).filter(a => a.nome);
      
      const sel = document.getElementById('sel-aluno');
      ALUNOS.forEach((a, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.innerText = a.nome; sel.appendChild(opt);
      });
      statusEl.className = 'db-status loaded';
      statusText.innerText = ALUNOS.length + ' carregados';
    } catch(e) { 
      statusEl.className = 'db-status error'; 
      statusText.innerText = 'Offline / Erro';
    }
  }
  carregarDados();

  document.getElementById('sel-aluno').onchange = function() {
    const a = ALUNOS[this.value];
    if(!a) return;
    document.getElementById('inp-nome').value = a.nome;
    document.getElementById('inp-matricula').value = a.mat || '';
    document.getElementById('inp-dn').value = a.dn || '';
    document.getElementById('inp-endereco').value = a.end || '';
    document.getElementById('inp-linha').value = a.linha || '';
    document.getElementById('inp-tel').value = a.tel || '';
    atualizar(); atualizarQR();
  };

  function atualizar() {
    const grid = document.getElementById('data-display');
    grid.innerHTML = '';
    let ok = false;

    if(secaoAtual === 'escolar') {
      const n = document.getElementById('inp-nome').value;
      const l = document.getElementById('inp-linha').value;
      document.getElementById('card-title').innerText = 'IDENTIFICAÇÃO TRANSPORTE';
      document.getElementById('card-footer-btn').innerText = 'Autorização Transporte Escolar';
      
      const fields = [
        ['Nome', n], ['Matrícula', document.getElementById('inp-matricula').value],
        ['D.N', document.getElementById('inp-dn').value], ['Endereço', document.getElementById('inp-endereco').value],
        ['Linha', l]
      ];
      fields.forEach(f => grid.innerHTML += `<div class="data-label">${f[0]}</div><div class="data-value">${f[1]}</div>`);
      ok = n && l;
      document.getElementById('qr-container').style.display = 'flex';
    } else {
      const n = document.getElementById('inp-saida-nome').value;
      document.getElementById('card-title').innerText = 'SAÍDA ANTECIPADA';
      document.getElementById('card-footer-btn').innerText = 'Autorização para saída antecipada do estudante';
      const fields = [
        ['Nome', n], ['Matrícula', document.getElementById('inp-saida-mat').value],
        ['D.N', document.getElementById('inp-saida-dn').value], ['Endereço', document.getElementById('inp-saida-end').value]
      ];
      fields.forEach(f => grid.innerHTML += `<div class="data-label">${f[0]}</div><div class="data-value">${f[1]}</div>`);
      ok = n;
      document.getElementById('qr-container').style.display = 'none';
    }
    document.getElementById('btn-adicionar').disabled = !ok;
  }

  function carregarFoto(i) {
    if(!i.files[0]) return;
    const r = new FileReader();
    r.onload = e => {
      const img = document.getElementById('photo-preview');
      img.src = e.target.result; img.style.display = 'block';
    }
    r.readAsDataURL(i.files[0]);
  }

  function atualizarQR() {
    const t = document.getElementById('inp-tel').value;
    const c = document.getElementById('qr-code-card');
    c.innerHTML = '';
    if(t) new QRCode(c, { text: 'wa.me/55'+t.replace(/\D/g,''), width: 80, height: 80, colorDark: '#C84B1F' });
  }

  function adicionarNaFila() {
    const clone = document.getElementById('carteirinha').cloneNode(true);
    clone.id = ''; clone.className = 'carteirinha-fila';
    const qrDest = clone.querySelector('#qr-code-card');
    if(qrDest) qrDest.innerHTML = document.getElementById('qr-code-card').innerHTML;
    document.getElementById('fila-carteirinhas').appendChild(clone);
  }

  function limparFila() { document.getElementById('fila-carteirinhas').innerHTML = ''; }
</script>
</body>
</html>
