<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Carteirinha | Escola Municipal Castro Alves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #1a0e08;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      color: #fff;
    }

    /* HEADER */
    .page-header { text-align: center; margin-bottom: 2.5rem; }
    .page-header h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #f5c87a, #e8763a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
    .page-header p { color: #a07050; font-size: 0.95rem; }

    .btn-logout {
      background: rgba(200,75,31,0.2);
      border: 1px solid rgba(200,75,31,0.4);
      border-radius: 8px;
      color: #e8763a; font-family: inherit;
      font-size: 0.82rem; font-weight: 600;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .db-status {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(40,20,5,0.6);
      border: 1px solid rgba(180,100,40,0.3);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.78rem; color: #a07050;
    }
    .db-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
    .db-status.loaded .dot { background: #6db87a; }

    /* LAYOUT MAIN */
    .main-layout {
      width: 100%; max-width: 1100px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* FORM PANEL */
    .form-panel {
      background: rgba(80, 35, 10, 0.5);
      border: 1px solid rgba(180, 100, 40, 0.3);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 1rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #c89060; margin-bottom: 0.3rem; text-transform: uppercase; }
    .form-group select, .form-group input { 
        width: 100%; background: rgba(20, 10, 5, 0.7); 
        border: 1px solid rgba(180, 100, 40, 0.4); 
        border-radius: 8px; color: #fff; padding: 0.6rem 0.8rem; font-family: inherit; 
    }

    .btn-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; flex-direction: column; }
    .btn-add { width: 100%; padding: 0.85rem; background: #a04018; border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; }
    .btn-download { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #c84b1f, #e8763a); border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; }

    /* ================================================================
       ESTILO DAS CARTEIRINHAS (PRÉVIA E IMPRESSÃO)
       ================================================================ */
    .card-container {
      width: 680px; height: 440px;
      background: #ffffff; border-radius: 12px;
      overflow: hidden; position: relative;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* Cabeçalho Profissional */
    .c-header {
      height: 100px; background: #5C2308;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 20px; position: relative; overflow: hidden;
    }
    .c-header::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, #7B3A18 0%, transparent 40%), linear-gradient(225deg, #9B4E20 0%, transparent 30%);
    }

    .logo-box { position: relative; z-index: 2; display: flex; align-items: center; gap: 12px; flex-direction: row-reverse; }
    .logo-img-circle { width: 62px; height: 62px; border: 3px solid #F5C030; border-radius: 50%; background: #fff; overflow: hidden; }
    .logo-img-circle img { width: 100%; height: 100%; object-fit: cover; }
    .school-txt { color: #fff; text-align: right; }
    .school-txt .name-big { font-size: 1.2rem; font-weight: 900; }

    /* Corpo Organizado */
    .c-body { display: flex; height: 260px; background: #fdfaf7; }
    
    .c-left { width: 200px; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; background: #fff; }
    .student-photo { width: 140px; height: 140px; border: 3px solid #C07030; border-radius: 50%; overflow: hidden; background: #eee; }
    .student-photo img { width: 100%; height: 100%; object-fit: cover; }
    .qr-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .qr-render { width: 80px; height: 80px; background: #fff; padding: 2px; }
    .qr-render img { width: 100% !important; height: 100% !important; }
    .qr-txt { font-size: 0.7rem; font-weight: 800; color: #C84B1F; font-style: italic; }

    .c-right { flex: 1; padding: 20px 25px; display: flex; flex-direction: column; gap: 15px; }
    .c-title { font-size: 0.85rem; font-weight: 900; color: #C84B1F; text-transform: uppercase; }
    .info-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .info-row { border-bottom: 1px solid #e8ddd0; padding-bottom: 3px; }
    .info-label { font-size: 0.7rem; font-weight: 700; color: #5C2308; }
    .info-value { font-size: 0.85rem; color: #222; font-weight: 600; text-transform: uppercase; }

    /* BARRA LARANJA INFERIOR - RÍGIDA */
    .c-footer-bar {
      position: absolute; bottom: 0; left: 0; width: 100%;
    }
    .orange-strap {
      background: #C84B1F; padding: 10px 15px; text-align: center;
      color: #fff; font-size: 0.75rem; font-weight: 700; font-style: italic; z-index: 10;
    }
    .brown-base { height: 10px; background: #5C2308; width: 100%; }

    /* ESTILO ESPECÍFICO PARA A FILA DE IMPRESSÃO (Pequena) */
    .carteirinha-fila {
      width: 10cm; height: 7cm; background: #fff; border: 1px solid #ddd;
      position: relative; overflow: hidden; flex-shrink: 0; transform-origin: top left;
    }
    .carteirinha-fila .c-header { height: 1.6cm; padding: 0 10px; }
    .carteirinha-fila .logo-img-circle { width: 38px; height: 38px; border-width: 2px; }
    .carteirinha-fila .school-txt .name-big { font-size: 11px; }
    .carteirinha-fila .c-left { width: 3.2cm; padding-top: 10px; gap: 8px; }
    .carteirinha-fila .student-photo { width: 2.3cm; height: 2.3cm; border-width: 2px; }
    .carteirinha-fila .qr-render { width: 1.5cm; height: 1.5cm; }
    .carteirinha-fila .qr-txt { font-size: 7px; }
    .carteirinha-fila .c-right { padding: 10px 12px; gap: 8px; }
    .carteirinha-fila .c-title { font-size: 8px; }
    .carteirinha-fila .info-label { font-size: 7px; }
    .carteirinha-fila .info-value { font-size: 9px; line-height: 1.1; }
    .carteirinha-fila .orange-strap { padding: 6px 8px; font-size: 6.5px; }
    .carteirinha-fila .brown-base { height: 8px; }

    .pagina-impressao { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; margin-top: 1rem; }

    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white !important; padding: 0; display: block !important; }
      .page-header, .form-panel, .card-panel > div:not(.pagina-impressao), .fila-titulo { display: none !important; }
      .pagina-impressao { display: grid !important; grid-template-columns: 10cm 10cm !important; justify-content: center !important; margin: 0 !important; }
      .carteirinha-fila { border: 1px solid #eee !important; box-shadow: none !important; page-break-inside: avoid; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <h1>Gerador de Carteirinhas</h1>
  <p>Escola Municipal Castro Alves</p>
  <div class="db-status loaded"><span class="dot"></span> <span>Base conectada</span></div>
</header>

<div class="main-layout">
  <aside class="form-panel">
    <div class="form-group"><label>Selecionar Aluno</label><select id="sel-aluno"><option value="">Carregando...</option></select></div>
    <div class="form-group"><label>Nome *</label><input type="text" id="inp-nome" oninput="renderLive()"></div>
    <div class="form-group"><label>Matrícula</label><input type="text" id="inp-mat" oninput="renderLive()"></div>
    <div class="form-group"><label>D.N</label><input type="text" id="inp-dn" placeholder="DD/MM/AAAA" oninput="renderLive()"></div>
    <div class="form-group"><label>Endereço</label><input type="text" id="inp-end" oninput="renderLive()"></div>
    <div class="form-group"><label>Linha *</label><input type="text" id="inp-linha" oninput="renderLive()"></div>
    <div class="form-group"><label>WhatsApp</label><input type="text" id="inp-tel" oninput="renderLive()"></div>
    <div class="form-group"><label>Foto</label><input type="file" id="foto-input" accept="image/*" onchange="readFoto(this)"></div>
    
    <div class="btn-actions">
        <button class="btn-add" id="btn-add" onclick="saveToPrint()" disabled>Adicionar à Folha</button>
        <button class="btn-download" onclick="window.print()">Imprimir Folha</button>
        <button class="btn-add" style="background:#666" onclick="location.reload()">Limpar Tudo</button>
    </div>
  </aside>

  <div class="card-panel">
    <div id="live-card" class="card-container">
      <div class="c-header">
        <div class="logo-box">
          <div class="logo-img-circle"><img src="logo_escola.png"></div>
          <div class="school-txt"><div class="name-big">Castro Alves</div></div>
        </div>
      </div>
      <div class="c-body">
        <div class="c-left">
          <div class="student-photo"><img id="preview-photo" src=""></div>
          <div class="qr-box"><div id="qr-live" class="qr-render"></div><div class="qr-txt">Contato</div></div>
        </div>
        <div class="c-right">
          <div class="c-title">IDENTIFICAÇÃO TRANSPORTE</div>
          <div class="info-grid">
            <div class="info-row"><div class="info-label">NOME:</div><div id="txt-nome" class="info-value"></div></div>
            <div class="info-row"><div class="info-label">MATRÍCULA:</div><div id="txt-mat" class="info-value"></div></div>
            <div class="info-row"><div class="info-label">D.N:</div><div id="txt-dn" class="info-value"></div></div>
            <div class="info-row"><div class="info-label">ENDEREÇO:</div><div id="txt-end" class="info-value"></div></div>
            <div class="info-row"><div class="info-label">LINHA:</div><div id="txt-linha" class="info-value"></div></div>
          </div>
        </div>
      </div>
      <div class="c-footer-bar">
        <div class="orange-strap">Autorização para as crianças e/ou estudantes que utilizam transporte escolar</div>
        <div class="brown-base"></div>
      </div>
    </div>

    <div id="pagina-resultado" class="pagina-impressao"></div>
  </div>
</div>

<script>
  let ALUNOS = [];
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/1_0Nr7rt1RClLouJ_g4saqU7JluswzIWf/gviz/tq?tqx=out:csv';

  async function loadSheet() {
    try {
      const r = await fetch(CSV_URL);
      const t = await r.text();
      const linhas = t.split('\n');
      const sel = document.getElementById('sel-aluno');
      sel.innerHTML = '<option value="">Selecione...</option>';
      for(let i=1; i<linhas.length; i++) {
        const c = linhas[i].split(',').map(v => v.replace(/^"|"$/g, '').trim());
        if(c[0]) {
          ALUNOS.push({ nome: c[0], mat: c[1]||'', dn: c[2]||'', tel: c[5]||'', end: c[6]||'', linha: c[7]||'' });
          const o = document.createElement('option'); o.value = ALUNOS.length-1; o.innerText = c[0]; sel.appendChild(o);
        }
      }
    } catch(e) { console.error(e); }
  }

  document.getElementById('sel-aluno').onchange = function() {
    const a = ALUNOS[this.value];
    if(a) {
      document.getElementById('inp-nome').value = a.nome; document.getElementById('inp-mat').value = a.mat;
      document.getElementById('inp-dn').value = a.dn; document.getElementById('inp-end').value = a.end;
      document.getElementById('inp-linha').value = a.linha; document.getElementById('inp-tel').value = a.tel;
      renderLive();
    }
  };

  function renderLive() {
    const n = document.getElementById('inp-nome').value;
    document.getElementById('txt-nome').innerText = n;
    document.getElementById('txt-mat').innerText = document.getElementById('inp-mat').value;
    document.getElementById('txt-dn').innerText = document.getElementById('inp-dn').value;
    document.getElementById('txt-end').innerText = document.getElementById('inp-end').value;
    document.getElementById('txt-linha').innerText = document.getElementById('inp-linha').value;
    
    const qrDiv = document.getElementById('qr-live'); qrDiv.innerHTML = '';
    const tel = document.getElementById('inp-tel').value.replace(/\D/g, '');
    if(tel.length >= 10) new QRCode(qrDiv, { text: 'https://wa.me/55'+tel, width: 80, height: 80, colorDark: "#C84B1F" });
    
    document.getElementById('btn-add').disabled = !n;
  }

  function readFoto(input) {
    if(input.files && input.files[0]) {
      const rd = new FileReader();
      rd.onload = e => { document.getElementById('preview-photo').src = e.target.result; };
      rd.readAsDataURL(input.files[0]);
    }
  }

  function saveToPrint() {
    const card = document.createElement('div');
    card.className = 'carteirinha-fila';
    card.innerHTML = document.getElementById('live-card').innerHTML;
    
    // Gerar QR code específico para o cartão pequeno
    const tel = document.getElementById('inp-tel').value.replace(/\D/g, '');
    const qrSmall = card.querySelector('.qr-render');
    qrSmall.innerHTML = '';
    if(tel.length >= 10) new QRCode(qrSmall, { text: 'https://wa.me/55'+tel, width: 60, height: 60, colorDark: "#C84B1F" });

    document.getElementById('pagina-resultado').appendChild(card);
  }

  window.onload = loadSheet;
</script>
</body>
</html>
